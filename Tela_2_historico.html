<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - EmbraPac</title>
    
    <link rel="preload" href="img/logo-embrapac.jpeg" as="image">

    <script src="theme-init.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    
    <style>       
        #tabela-alarmes, #tabela-alarmes th, #tabela-alarmes td, .table-row { background-color: transparent !important; }
        #tabela-alarmes .table-row:hover { background-color: rgba(255, 255, 255, 0.3) !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="img/logo-embrapac.jpeg" alt="Logo Embrapac" class="logo-img">
            IHM Operacional
        </div>
        <nav>
            <a href="Tela_1_operador.html">Painel de Operações</a>
            <a href="Tela_2_historico.html" class="active">Histórico</a>
            <a href="Tela_3_supervisor.html"><i class="fas fa-lock" aria-hidden="true"></i> Supervisor</a>
        </nav>
        <div class="user-info">
            <i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Carregando...           
        </div>
    </header>

    <main>
        <div class="card-full transparent-bg" style="margin-bottom: 20px;">
            <h2 style="color: var(--primary-blue); margin-top:0;">
                <i class="fas fa-filter" aria-hidden="true"></i> Filtros de Pesquisa
            </h2>
            
            <div class="filters" style="display: flex; flex-wrap: wrap; align-items: center;">
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Data Inicial:</label>
                    <input type="date" id="filter-date-start" class="input-std">
                    
                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Hora Inicial:</label>
                    <input type="time" id="filter-time-start" class="input-std">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 5px; margin-left: 10px;">
                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Data Final:</label>
                    <input type="date" id="filter-date-end" class="input-std">
                    
                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Hora Final:</label>
                    <input type="time" id="filter-time-end" class="input-std">
                </div>
                
                <div style="width: 1px; height: 80px; background: #ddd; margin: 0 15px;"></div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Busca Rápida:</label>
                    <input type="text" id="search-input" class="input-std" placeholder="Buscar termo...">

                    <label style="font-weight: bold; color: var(--primary-blue); font-size: 0.9rem;">Status do Registro:</label>
                    <select id="filter-status" class="input-std">
                        <option value="all">Todos os Status</option>
                        <option value="INFORME">Informe (Sistema)</option>
                        <option value="NORMAL">Normal (Operação)</option>
                        <option value="ALERTA">Alerta (Atenção)</option>
                        <option value="FALHA">Falha (Crítico)</option>
                        <option value="ATIVO">Ativo (Disparado)</option>
                        <option value="RECONHECIDO">Reconhecido</option>
                    </select>
                </div>

                <div style="display: flex; flex-direction: column; gap: 10px; margin-left: 20px; justify-content: center;">
                    <button class="btn-filter" onclick="filtrarTabela()">
                        <i class="fas fa-search" aria-hidden="true"></i> Pesquisar
                    </button>

                    <button class="btn-filter btn-reset" onclick="limparFiltros()">
                        <i class="fas fa-eraser" aria-hidden="true"></i> Limpar Filtros
                    </button>
                </div>
                
            </div> 
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <button id="tab-eventos" class="btn-action btn-blue" onclick="mudarAba('eventos')" style="flex: 1; opacity: 0.4; margin: 0; box-shadow: none;">
                <i class="fas fa-clipboard-list" aria-hidden="true"></i> VER EVENTOS DE PRODUÇÃO
            </button>
            <button id="tab-alarmes" class="btn-action btn-red" onclick="mudarAba('alarmes')" style="flex: 1; opacity: 1; margin: 0; box-shadow: none;">
                <i class="fas fa-exclamation-triangle" aria-hidden="true"></i> VER ALARMES E FALHAS
            </button>
        </div>

        <div class="card-full transparent-bg">
            <div class="card-header">
                <h2 id="titulo-tabela" style="color: var(--primary-blue); margin:0;">
                    <i class="fas fa-exclamation-triangle" aria-hidden="true"></i> Histórico de Alarmes
                </h2>
                <button class="btn-filter" style="background-color: var(--success-color);" onclick="exportarDados()">
                    <i class="fas fa-file-export" aria-hidden="true"></i> Exportar Dados
                </button>
            </div>

            <table id="tabela-alarmes">
                <thead>
                    <tr>
                       <th class="col-data">Data/Hora</th>
                       <th class="col-desc">Descrição do Evento</th>
                       <th class="col-source">Usuário / Fonte</th> 
                       <th class="col-workflow">Atributo / Workflow</th>
                       <th class="col-status">Status</th> 
                    </tr>
                 </thead>
                 <tbody id="tbody-alarmes"></tbody>
            </table>

            <div style="text-align: center; margin-top: 20px; padding-bottom: 20px;">
                <button id="btn-carregar-mais" class="btn-action btn-blue" onclick="carregarMaisLogs()" style="display: none; margin: 0 auto;">
                    <i class="fas fa-chevron-down" aria-hidden="true"></i> Carregar Mais Logs
                </button>
            </div>
        </div>
        
        <p style="text-align: right; color: #999; font-size: 0.9rem; margin-top: 15px;">
            Exibindo registros do sistema.
        </p>
    </main>

    <script src="master.js"></script>
    <script src="historico.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Sessao !== 'undefined') Sessao.atualizarHeader();
            if (typeof mudarAba === 'function') mudarAba('alarmes');
        });
    </script>
</body>
</html>
